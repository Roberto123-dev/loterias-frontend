<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>🎯 Lotofácil - Resultados</title>
        <!-- ✅ ADICIONAR ESTA LINHA: -->
        <script src="js/config.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #930089 0%, #6b0064 100%);
                min-height: 100vh;
                padding: 10px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
            }

            /* Header */
            header {
                background: white;
                border-radius: 5px;
                padding: 15px;
                margin-bottom: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 20px;
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .icon-large {
                font-size: 3rem;
            }

            h1 {
                font-size: 1.5rem;
                color: #930089;
                margin-bottom: 5px;
            }

            .subtitle {
                color: #666;
                font-size: 1rem;
            }

            .btn-voltar {
                padding: 12px 24px;
                background: #930089;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                transition: opacity 0.3s;
            }

            .btn-voltar:hover {
                opacity: 0.9;
            }

            /* Tabela */
            .tabela-container {
                background: white;
                border-radius: 5px;
                padding: 15px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            }

            /* Loading */
            .loading {
                text-align: center;
                padding: 40px;
                color: #666;
                font-size: 1.2rem;
            }

            .loading::after {
                content: "...";
                animation: dots 1.5s steps(4, end) infinite;
            }

            @keyframes dots {
                0%,
                20% {
                    content: ".";
                }

                40% {
                    content: "..";
                }

                60%,
                100% {
                    content: "...";
                }
            }

            /* =========================
        CARDS 5x5 LOTOFÁCIL
      ========================= */

            .cards-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }

            .card-concurso {
                background: #fff;
                border-radius: 12px;
                padding: 15px;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            }

            .card-header {
                font-weight: bold;
                color: #930089;
                margin-bottom: 10px;
                display: flex;
                justify-content: space-between;
                font-size: 0.95rem;
            }

            .card-concurso:first-child {
                border: 2px solid #930089;
            }

            .grid-25 {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 6px;
            }

            .dezena {
                aspect-ratio: 1 / 1;
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.85rem;
                font-weight: bold;
                background: #eee;
                color: #666;
                border: 1px solid #d1d5db;
            }

            .dezena.sorteada {
                background: #930089;
                color: #fff;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <!-- Header -->
            <header>
                <div class="header-left">
                    <div class="icon-large">
                        <img src="image/favicon-lf-32.png" alt="Lotofácil" />
                    </div>
                    <div>
                        <h1>Lotofácil</h1>
                        <div class="subtitle">Resultados</div>
                    </div>
                </div>
                <a href="index.html" class="btn-voltar">← Voltar</a>
            </header>

            <!-- Tabela -->
            <div class="tabela-container">
                <div id="loading" class="loading">Carregando resultados</div>

                <div
                    id="cards-resultados"
                    class="cards-container"
                    style="display: none"
                ></div>
            </div>
        </div>

        <script>
            const ENDPOINT = "/lotofacil";

            const LIMITE = 10;

            // ✅ Pegar token do localStorage
            function getToken() {
                return localStorage.getItem("token");
            }

            // ✅ Criar headers com autenticação
            function getHeaders() {
                const token = getToken();
                return {
                    Authorization: `Bearer ${token}`,
                    "Content-Type": "application/json",
                };
            }

            // ✅ Verificar se está autenticado
            function verificarAutenticacao() {
                const token = getToken();
                if (!token) {
                    alert("Você precisa fazer login para acessar esta página!");
                    window.location.href = "login.html";
                    return false;
                }
                return true;
            }

            // Carregar dados iniciais
            async function carregarDados() {
                if (!verificarAutenticacao()) return;
                await carregarResultados();
            }

            async function carregarResultados() {
                const loading = document.getElementById("loading");
                const cards = document.getElementById("cards-resultados");

                loading.style.display = "block";
                cards.style.display = "none";

                try {
                    // ✅ Adicionar token na requisição
                    const response = await fetch(
                        `${API_URL}${ENDPOINT}?limit=${LIMITE}`,
                        { headers: getHeaders() },
                    );

                    const data = await response.json();

                    if (data.success) {
                        renderizarCards(data.data);
                        loading.style.display = "none";
                        cards.style.display = "grid";
                    } else {
                        loading.textContent = "❌ Nenhum resultado encontrado";
                    }
                } catch (error) {
                    console.error(error);
                    loading.textContent = "❌ Erro ao carregar resultados";
                }
            }

            function gerarGrid(dezenasSorteadas) {
                let html = "";

                for (let i = 1; i <= 25; i++) {
                    html += `
            <div class="dezena ${dezenasSorteadas.includes(i) ? "sorteada" : ""}">
              ${String(i).padStart(2, "0")}
            </div>
          `;
                }

                return html;
            }

            function renderizarCards(resultados) {
                resultados.sort((a, b) => b.concurso - a.concurso);
                const container = document.getElementById("cards-resultados");
                container.innerHTML = "";

                resultados.forEach((resultado) => {
                    const dezenasSorteadas = (
                        resultado.dezenas ||
                        resultado.dezenas_1 ||
                        []
                    ).map((n) => parseInt(n));

                    const card = document.createElement("div");
                    card.className = "card-concurso";

                    card.innerHTML = `
            <div class="card-header">
              <span>Concurso #${resultado.concurso}</span>
              <span>${resultado.data || ""}</span>
            </div>
            <div class="grid-25">
              ${gerarGrid(dezenasSorteadas)}
            </div>
          `;

                    container.appendChild(card);
                });
            }

            // ✅ Carregar ao iniciar (após verificar auth)
            carregarDados();
        </script>
        <script src="js/auth-check.js"></script>
        <script>
            // Autenticação básica
            if (verificarAutenticacao()) {
                // 🚫 Verificação do plano
                verificarPlanoPro();
            }
        </script>
    </body>
</html>
