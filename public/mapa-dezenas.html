<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>📊 Mapa das Dezenas - Sistema de Loterias</title>
        <script src="js/config.js"></script>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
        />

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --cor-loteria: #667eea;
                --titulo-loteria-cor: var(--cor-loteria);
                --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                --bg-header: #f5f5f5;
                --card-bg: #ffffff;
                --card-border: rgba(0, 0, 0, 0.08);

                --text-primary: #1f2937;
                --text-secondary: #4b5563;
                --text-muted: #6b7280;

                --input-bg: #ffffff;
                --input-border: #d1d5db;

                --table-border: #d1d5db;
                --row-hover: #f8f9fa;

                --info-bg: #f0f4ff;
                --info-text: #556070;

                --number-off-bg: #e1e1e1;
                --number-off-text: #999999;

                --stats-bg: #f3f4f6;
                --stats-label: #1f2937;

                --selected-col-header-bg: #fff3b0;
                --selected-col-header-text: #5a4300;
                --selected-col-bg: #fff8d6;

                --temp-q: #ffb3c7;
                --temp-m: #ffe29a;
                --temp-f: #9fd3ff;
                --temp-text: #1f2937;

                --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);

                --cores-check-border: #d1d5db;
                --cores-check-bg: #ffffff;
            }

            html[data-theme="dark"] {
                --bg-body: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                --bg-header: #111827;
                --card-bg: #111827;
                --card-border: rgba(255, 255, 255, 0.08);

                --titulo-loteria-cor: #ffffff;

                --text-primary: #f3f4f6;
                --text-secondary: #d1d5db;
                --text-muted: #9ca3af;

                --input-bg: #0f172a;
                --input-border: #374151;

                --table-border: #273244;
                --row-hover: #172132;

                --info-bg: #172554;
                --info-text: #dbeafe;

                --number-off-bg: #1f2937;
                --number-off-text: #94a3b8;

                --stats-bg: #1f2937;
                --stats-label: #f9fafb;

                --selected-col-header-bg: #fde68a;
                --selected-col-header-text: #3b2f00;
                --selected-col-bg: #4b3d09;

                --temp-q: #7f1d3f;
                --temp-m: #7c5b12;
                --temp-f: #0c4a6e;
                --temp-text: #f9fafb;

                --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);

                --cores-check-border: #4b5563;
                --cores-check-bg: #1f2937;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: var(--bg-body);
                color: var(--text-primary);
                min-height: 100vh;
                padding: 0;
                margin: 0;
                transition:
                    background 0.3s ease,
                    color 0.3s ease;
            }

            .container {
                max-width: 100%;
                padding: 10px;
                margin: 0;
            }

            /* Header */
            header {
                background: var(--bg-header);
                padding: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
                border-bottom: 1px solid var(--card-border);
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                transition:
                    background 0.3s ease,
                    border-color 0.3s ease;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .btn-tema,
            .btn-voltar {
                width: 48px;
                height: 48px;
                padding: 0;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 8px;
                text-decoration: none;
                transition: all 0.3s ease;
            }

            .btn-tema {
                background: var(--card-bg);
                color: var(--text-primary);
                border: 1px solid var(--card-border);
                cursor: pointer;
            }

            .btn-tema:hover {
                background: var(--row-hover);
            }

            .btn-voltar {
                background: #667eea;
                color: white;
                border: none;
                font-size: 1rem;
                cursor: pointer;
            }

            .btn-voltar:hover {
                opacity: 0.9;
            }

            .header-content {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px;
                background-color: var(--bg-header);
            }

            h1 {
                font-size: 2rem;
                color: var(--cor-loteria-cor);
                margin: 0;
            }

            /* Controles */
            .controles-container {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 5px;
                padding: 25px;
                margin-bottom: 20px;
                box-shadow: var(--shadow);
                transition:
                    background 0.3s ease,
                    border-color 0.3s ease,
                    box-shadow 0.3s ease;
            }

            .controles-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
                align-items: end;
            }

            .form-group {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .form-group label {
                font-size: 0.95rem;
                font-weight: 600;
                color: var(--text-primary);
            }

            .form-group select {
                padding: 12px;
                border: 2px solid var(--input-border);
                border-radius: 8px;
                font-size: 1rem;
                background: var(--input-bg);
                color: var(--text-primary);
                transition:
                    border-color 0.3s,
                    background 0.3s,
                    color 0.3s;
            }

            .form-group select:focus {
                outline: none;
                border-color: var(--cor-loteria, #667eea);
                box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
            }

            .btn-atualizar {
                padding: 12px 30px;
                background: var(--cor-loteria, #667eea);
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: bold;
                cursor: pointer;
                transition: opacity 0.3s;
            }

            .btn-atualizar:hover {
                opacity: 0.9;
            }

            /* ===== CORES DAS BOLAS - Checkbox ===== */
            .cores-bolas-wrapper {
                display: none;
                margin-top: 15px;
                padding-top: 15px;
                border-top: 1px solid var(--card-border);
                transition: border-color 0.3s ease;
            }

            .cores-bolas-label {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                user-select: none;
                padding: 8px 14px;
                border-radius: 8px;
                border: 2px solid var(--cores-check-border);
                background: var(--cores-check-bg);
                transition:
                    border-color 0.25s,
                    background 0.25s,
                    box-shadow 0.25s;
            }

            .cores-bolas-label:hover {
                border-color: var(--cor-loteria, #667eea);
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
            }

            .cores-bolas-label.ativo {
                border-color: var(--cor-loteria, #667eea);
                background: color-mix(
                    in srgb,
                    var(--cor-loteria, #667eea) 8%,
                    var(--cores-check-bg)
                );
            }

            #chk-cores-bolas {
                width: 18px;
                height: 18px;
                cursor: pointer;
                accent-color: var(--cor-loteria, #667eea);
                flex-shrink: 0;
            }

            .cores-bolas-texto {
                font-weight: 600;
                font-size: 0.9rem;
                color: var(--text-primary);
                transition: color 0.25s;
            }

            /* Mini preview das cores */
            .cores-preview {
                display: flex;
                gap: 3px;
                align-items: center;
            }

            .cores-preview span {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                flex-shrink: 0;
            }

            /* Tabela */
            .tabela-container {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 5px;
                padding: 15px;
                box-shadow: var(--shadow);
                overflow-x: auto;
                transition:
                    background 0.3s ease,
                    border-color 0.3s ease,
                    box-shadow 0.3s ease;
            }

            .info-scroll {
                text-align: center;
                padding: 10px;
                color: var(--info-text);
                font-size: 0.9rem;
                background: var(--info-bg);
                border-radius: 8px;
                margin-bottom: 15px;
                transition:
                    background 0.3s ease,
                    color 0.3s ease;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                min-width: 1000px;
            }

            thead {
                background: var(--cor-loteria, #667eea);
                color: white;
            }

            thead th {
                padding: 12px 8px;
                text-align: center;
                font-weight: 600;
                font-size: 0.9rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

            tbody tr {
                transition: background 0.2s;
            }

            tbody tr:hover {
                background: var(--row-hover);
            }

            tbody td {
                padding: 10px 8px;
                text-align: center;
                border: 1px solid var(--table-border);
                font-size: 0.85rem;
                color: var(--text-primary);
            }

            tbody td:first-child {
                font-weight: 600;
                color: var(--cor-loteria, #667eea);
            }

            html[data-theme="dark"]
                #tbody-mapa
                tr:not(.linha-estatistica)
                td:first-child {
                color: #f78100;
            }

            .numero-cell {
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 20%;
                font-weight: bold;
                margin: 0 auto;
                border: 1px solid transparent;
                transition:
                    background 0.25s ease,
                    color 0.25s ease;
            }

            .numero-cell.sorteado {
                background: var(--cor-loteria, #667eea);
                color: white;
            }

            .numero-cell.nao-sorteado {
                background: var(--number-off-bg);
                color: var(--number-off-text);
            }

            .loading {
                text-align: center;
                padding: 60px 20px;
                color: var(--cor-loteria, #667eea);
                font-size: 1.3rem;
            }

            .loading::after {
                content: "...";
                animation: dots 1.5s steps(4, end) infinite;
            }

            @keyframes dots {
                0%,
                20% {
                    content: ".";
                }
                40% {
                    content: "..";
                }
                60%,
                100% {
                    content: "...";
                }
            }

            /* Responsivo */
            @media (max-width: 768px) {
                h1 {
                    font-size: 1.1rem;
                }
                .controles-container {
                    padding: 10px;
                }
                .controles-grid {
                    grid-template-columns: 1fr;
                }
                .tabela-container {
                    padding: 15px;
                }
                thead th {
                    padding: 10px 5px;
                    font-size: 0.8rem;
                }
                tbody td {
                    padding: 8px 5px;
                    font-size: 0.75rem;
                }
                .numero-cell {
                    width: 35px;
                    height: 35px;
                    font-size: 0.8rem;
                }
            }

            /* ===== Seleção de coluna ===== */
            th.coluna-ativa {
                background: var(--selected-col-header-bg) !important;
                color: var(--selected-col-header-text) !important;
                cursor: pointer;
            }

            td.coluna-ativa {
                background: var(--selected-col-bg) !important;
            }

            th {
                cursor: pointer;
                user-select: none;
            }

            /* ===== Temperatura ===== */
            .temp-Q {
                background: var(--temp-q);
                color: var(--temp-text);
                font-weight: bold;
            }
            .temp-M {
                background: var(--temp-m);
                color: var(--temp-text);
                font-weight: bold;
            }
            .temp-F {
                background: var(--temp-f);
                color: var(--temp-text);
                font-weight: bold;
            }

            /* ===== Destaque nomes estatísticas ===== */
            .estatistica-destaque {
                color: var(--stats-label);
                font-weight: 700;
            }
            .linha-estatistica td:first-child {
                background: var(--stats-bg);
                color: var(--stats-label);
            }

            /* ===== Select com ícone ===== */
            .select-com-icone {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .select-com-icone img {
                width: 24px;
                height: 24px;
                flex-shrink: 0;
            }

            .select-com-icone select {
                flex: 1;
            }
        </style>
    </head>

    <body>
        <!-- Header -->
        <div class="header-content">
            <h1
                id="titulo-loteria"
                style="display: flex; align-items: center; gap: 10px"
            >
                <i class="bi bi-bar-chart-fill"></i>
                Mapa das Dezenas
            </h1>

            <div class="header-actions">
                <button
                    type="button"
                    class="btn-tema"
                    id="btn-tema"
                    onclick="alternarTema()"
                    title="Ativar modo noturno"
                >
                    <i class="bi bi-moon-stars-fill"></i>
                </button>

                <a href="index.html" class="btn-voltar" title="Voltar">
                    <i class="bi bi-arrow-left"></i>
                </a>
            </div>
        </div>

        <div class="container">
            <!-- Controles -->
            <div class="controles-container">
                <div class="controles-grid">
                    <div class="form-group">
                        <label for="loteria-select">Loteria:</label>
                        <div class="select-com-icone">
                            <img
                                id="icone-loteria"
                                src="image/favicon-lf-32.png"
                                alt="Loteria"
                            />
                            <select
                                id="loteria-select"
                                onchange="mudarLoteria()"
                            >
                                <option value="">
                                    -- Selecione uma loteria --
                                </option>
                                <option value="lotofacil">Lotofácil</option>
                                <option value="megasena">Mega-Sena</option>
                                <option value="quina">Quina</option>
                                <option value="lotomania">Lotomania</option>
                                <option value="duplasena">Dupla-Sena</option>
                                <option value="timemania">Timemania</option>
                                <option value="diadasorte">Dia de Sorte</option>
                                <option value="maismilionaria">
                                    +Milionária
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="qtd-concursos">Exibir:</label>
                        <select id="qtd-concursos">
                            <option value="5">5 concursos</option>
                            <option value="10" selected>10 concursos</option>
                            <option value="15">15 concursos</option>
                            <option value="20">20 concursos</option>
                            <option value="25">25 concursos</option>
                            <option value="50">50 concursos</option>
                            <option value="100">100 concursos</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <button
                            class="btn-atualizar"
                            onclick="carregarTabela()"
                            id="btn-atualizar"
                            disabled
                        >
                            🔄 Atualizar
                        </button>
                    </div>
                </div>

                <!-- ===== CORES DAS BOLAS SORTEADAS ===== -->
                <div class="cores-bolas-wrapper" id="cores-bolas-wrapper">
                    <label
                        class="cores-bolas-label"
                        id="cores-bolas-label"
                        for="chk-cores-bolas"
                    >
                        <input
                            type="checkbox"
                            id="chk-cores-bolas"
                            onchange="toggleCoresBolas()"
                        />
                        <span class="cores-bolas-texto"
                            >🎨 Cores das Bolas Sorteadas</span
                        >
                        <div class="cores-preview" id="cores-preview"></div>
                    </label>
                </div>
            </div>

            <!-- Tabela -->
            <div
                class="tabela-container"
                id="tabela-container"
                style="display: none"
            >
                <div class="info-scroll">
                    👉 Role para o lado para ver todas as dezenas
                </div>

                <div id="loading" class="loading">Carregando dados</div>

                <table id="tabela-mapa" style="display: none">
                    <thead id="thead-mapa"></thead>
                    <tbody id="tbody-mapa"></tbody>
                </table>
            </div>
        </div>

        <script>
            // ===== CONFIG DAS LOTERIAS =====
            const LOTERIAS_CONFIG = {
                megasena: {
                    nome: "Mega-Sena",
                    min: 1,
                    max: 60,
                    endpoint: "/megasena",
                    cor: "#209869",
                },
                lotofacil: {
                    nome: "Lotofácil",
                    min: 1,
                    max: 25,
                    endpoint: "/lotofacil",
                    cor: "#930089",
                },
                quina: {
                    nome: "Quina",
                    min: 1,
                    max: 80,
                    endpoint: "/quina",
                    cor: "#260085",
                },
                lotomania: {
                    nome: "Lotomania",
                    min: 0,
                    max: 99,
                    endpoint: "/lotomania",
                    cor: "#F78100",
                },
                duplasena: {
                    nome: "Dupla-Sena",
                    min: 1,
                    max: 50,
                    endpoint: "/duplasena",
                    cor: "#A61324",
                    doisSorteios: true,
                },
                timemania: {
                    nome: "Timemania",
                    min: 1,
                    max: 80,
                    endpoint: "/timemania",
                    cor: "#00FF48",
                },
                diadasorte: {
                    nome: "Dia de Sorte",
                    min: 1,
                    max: 31,
                    endpoint: "/diadasorte",
                    cor: "#CB852B",
                },
                maismilionaria: {
                    nome: "+Milionária",
                    min: 1,
                    max: 50,
                    endpoint: "/maismilionaria",
                    cor: "#6BCCEF",
                },
            };

            let loteriaAtual = null;

            // ===== AUTH =====
            function getToken() {
                return localStorage.getItem("token");
            }
            function getHeaders() {
                return {
                    Authorization: `Bearer ${getToken()}`,
                    "Content-Type": "application/json",
                };
            }
            function verificarAutenticacao() {
                if (!getToken()) {
                    alert("Você precisa fazer login para acessar esta página!");
                    window.location.href = "login.html";
                    return false;
                }
                return true;
            }

            // ===== MUDAR LOTERIA =====
            function mudarLoteria() {
                const select = document.getElementById("loteria-select");
                const loteriaId = select.value;

                const icones = {
                    lotofacil: "image/favicon-lf-32.png",
                    megasena: "image/favicon-ms-32.png",
                    quina: "image/favicon-qu-32.png",
                    lotomania: "image/favicon-lm-32.png",
                    duplasena: "image/favicon-ds-32.png",
                    timemania: "image/favicon-tm-32.png",
                    diadasorte: "image/favicon-di-32.png",
                    maismilionaria: "image/favicon-mm-32.png",
                };

                const iconeLoteria = document.getElementById("icone-loteria");
                const wrapper = document.getElementById("cores-bolas-wrapper");
                const chk = document.getElementById("chk-cores-bolas");

                if (!loteriaId) {
                    loteriaAtual = null;
                    document.getElementById("btn-atualizar").disabled = true;
                    document.getElementById("tabela-container").style.display =
                        "none";
                    document.documentElement.style.setProperty(
                        "--cor-loteria",
                        "#667eea",
                    );
                    iconeLoteria.src = "image/favicon-lf-32.png";
                    wrapper.style.display = "none";
                    chk.checked = false;
                    atualizarTituloLoteria();
                    return;
                }

                loteriaAtual = LOTERIAS_CONFIG[loteriaId];
                document.documentElement.style.setProperty(
                    "--cor-loteria",
                    loteriaAtual.cor,
                );

                if (icones[loteriaId]) iconeLoteria.src = icones[loteriaId];

                atualizarTituloLoteria();
                document.getElementById("btn-atualizar").disabled = false;

                // Exibir checkbox de cores
                wrapper.style.display = "block";

                // Restaurar estado salvo
                const saved = localStorage.getItem(`coresBolas_${loteriaId}`);
                chk.checked = saved === "1";
                atualizarEstiloCheckbox(chk.checked);
                atualizarPreviewCores(loteriaId);
            }

            // ===== CORES DAS BOLAS - Toggle =====
            function toggleCoresBolas() {
                const chk = document.getElementById("chk-cores-bolas");
                const loteriaId =
                    document.getElementById("loteria-select").value;
                const ativo = chk.checked;

                localStorage.setItem(
                    `coresBolas_${loteriaId}`,
                    ativo ? "1" : "0",
                );
                atualizarEstiloCheckbox(ativo);
                aplicarCoresBolas(ativo);
            }

            function aplicarCoresBolas(ativar) {
                const loteriaId =
                    document.getElementById("loteria-select").value;
                const mapa = CORES_BOLAS[loteriaId] || null;

                document
                    .querySelectorAll(".numero-cell.sorteado")
                    .forEach((div) => {
                        if (ativar && mapa) {
                            const num = parseInt(div.dataset.numero);
                            const cor = mapa[num];
                            if (cor) {
                                div.style.background = cor.bg;
                                div.style.color = cor.text;
                                div.style.borderColor = cor.border;
                                div.style.boxShadow = `0 2px 6px ${cor.bg}88`;
                            }
                        } else {
                            div.style.background = "";
                            div.style.color = "";
                            div.style.borderColor = "";
                            div.style.boxShadow = "";
                        }
                    });
            }

            function atualizarEstiloCheckbox(ativo) {
                const label = document.getElementById("cores-bolas-label");
                if (ativo) {
                    label.classList.add("ativo");
                } else {
                    label.classList.remove("ativo");
                }
            }

            // Mini preview com as primeiras 10 cores da loteria
            function atualizarPreviewCores(loteriaId) {
                const preview = document.getElementById("cores-preview");
                preview.innerHTML = "";
                const mapa = CORES_BOLAS[loteriaId];
                if (!mapa) return;

                const nums = Object.keys(mapa).slice(0, 10).map(Number);
                nums.forEach((n) => {
                    const span = document.createElement("span");
                    span.style.background = mapa[n].bg;
                    span.title = `Dezena ${n}`;
                    preview.appendChild(span);
                });
            }

            // ===== TEMA =====
            function aplicarTema(tema) {
                document.documentElement.setAttribute("data-theme", tema);
                const btnTema = document.getElementById("btn-tema");
                if (btnTema) {
                    if (tema === "dark") {
                        btnTema.innerHTML = `<i class="bi bi-sun-fill"></i>`;
                        btnTema.title = "Ativar modo claro";
                    } else {
                        btnTema.innerHTML = `<i class="bi bi-moon-stars-fill"></i>`;
                        btnTema.title = "Ativar modo noturno";
                    }
                }
                localStorage.setItem("temaMapaDezenas", tema);
                atualizarTituloLoteria();
            }

            function alternarTema() {
                const temaAtual =
                    document.documentElement.getAttribute("data-theme") ||
                    "light";
                aplicarTema(temaAtual === "dark" ? "light" : "dark");
            }

            function atualizarTituloLoteria() {
                const titulo = document.getElementById("titulo-loteria");
                const temaAtual =
                    document.documentElement.getAttribute("data-theme") ||
                    "light";
                if (!titulo) return;

                if (!loteriaAtual) {
                    const corTexto =
                        temaAtual === "dark" ? "#ffffff" : "#667eea";
                    titulo.innerHTML = `
                        <i class="bi bi-bar-chart-fill" style="color:#667eea;"></i>
                        <span style="color:${corTexto};">Mapa das Dezenas</span>
                    `;
                    return;
                }

                const corTexto =
                    temaAtual === "dark" ? "#ffffff" : loteriaAtual.cor;
                titulo.innerHTML = `
                    <i class="bi bi-bar-chart-fill" style="color:${loteriaAtual.cor};"></i>
                    <span style="color:${corTexto};">Mapa das Dezenas - ${loteriaAtual.nome}</span>
                `;
            }

            // ===== CARREGAR TABELA =====
            async function carregarTabela() {
                if (!verificarAutenticacao()) return;

                const tabelaContainer =
                    document.getElementById("tabela-container");
                const loading = document.getElementById("loading");
                const tabela = document.getElementById("tabela-mapa");
                const qtdConcursos = parseInt(
                    document.getElementById("qtd-concursos").value,
                );

                tabelaContainer.style.display = "block";
                loading.style.display = "block";
                tabela.style.display = "none";

                try {
                    const response = await fetch(
                        `${API_URL}${loteriaAtual.endpoint}?limit=${qtdConcursos}`,
                        { headers: getHeaders() },
                    );

                    if (!response.ok) {
                        if (response.status === 401) {
                            alert("Sessão expirada. Faça login novamente.");
                            window.location.href = "login.html";
                            return;
                        } else if (response.status === 403) {
                            alert(
                                "Este recurso está disponível apenas para usuários PRÓ.",
                            );
                            window.location.href = "index.html";
                            return;
                        }
                        throw new Error(
                            `Erro ${response.status}: ${response.statusText}`,
                        );
                    }

                    const data = await response.json();
                    if (!data.success) throw new Error("Erro ao buscar dados");

                    criarTabelaMapa(data.data);

                    loading.style.display = "none";
                    tabela.style.display = "table";
                } catch (error) {
                    console.error("Erro:", error);
                    loading.textContent = "❌ Erro ao carregar dados";
                }
            }

            // ===== CRIAR TABELA =====
            function criarTabelaMapa(concursos) {
                colunasSelecionadas.clear();

                const thead = document.getElementById("thead-mapa");
                const tbody = document.getElementById("tbody-mapa");
                thead.innerHTML = "";
                tbody.innerHTML = "";

                concursos = concursos.reverse();

                const trHead = document.createElement("tr");
                trHead.innerHTML = "<th>Concurso</th>";

                for (let i = loteriaAtual.min; i <= loteriaAtual.max; i++) {
                    const th = document.createElement("th");
                    th.textContent =
                        loteriaAtual.min === 0
                            ? i.toString().padStart(2, "0")
                            : i;
                    trHead.appendChild(th);
                }
                thead.appendChild(trHead);

                concursos.forEach((concurso) => {
                    if (loteriaAtual.doisSorteios) {
                        criarLinhaConcurso(
                            concurso,
                            concurso.dezenas_1 || [],
                            `#${concurso.concurso} (1º)`,
                        );
                        criarLinhaConcurso(
                            concurso,
                            concurso.dezenas_2 || [],
                            `#${concurso.concurso} (2º)`,
                        );
                    } else {
                        criarLinhaConcurso(
                            concurso,
                            concurso.dezenas || [],
                            `#${concurso.concurso}`,
                        );
                    }
                });

                gerarEstatisticasMapa();

                // Aplicar cores se checkbox estiver marcado
                const chk = document.getElementById("chk-cores-bolas");
                if (chk && chk.checked) aplicarCoresBolas(true);
            }

            function criarLinhaConcurso(
                concurso,
                dezenasSorteadas,
                labelConcurso,
            ) {
                const tbody = document.getElementById("tbody-mapa");
                const tr = document.createElement("tr");

                const tdConcurso = document.createElement("td");
                tdConcurso.textContent = labelConcurso;
                tr.appendChild(tdConcurso);

                for (let i = loteriaAtual.min; i <= loteriaAtual.max; i++) {
                    const td = document.createElement("td");
                    const div = document.createElement("div");
                    div.className = "numero-cell";

                    const foiSorteado = dezenasSorteadas.includes(i);
                    const numStr =
                        loteriaAtual.min === 0
                            ? i.toString().padStart(2, "0")
                            : i;

                    if (foiSorteado) {
                        div.classList.add("sorteado");
                        div.dataset.numero = i; // ← chave para as cores
                        div.textContent = numStr;
                    } else {
                        div.classList.add("nao-sorteado");
                        div.textContent = numStr;
                    }

                    td.appendChild(div);
                    tr.appendChild(td);
                }

                tbody.appendChild(tr);
            }

            // ===== ESTATÍSTICAS =====
            function gerarEstatisticasMapa() {
                const tbody = document.getElementById("tbody-mapa");
                const linhas = Array.from(tbody.querySelectorAll("tr"));

                const totalDezenas = loteriaAtual.max - loteriaAtual.min + 1;
                const totalConcursos = linhas.length;

                const freq = Array(totalDezenas).fill(0);
                const atraso = Array(totalDezenas).fill(0);
                const sequencia = Array(totalDezenas).fill(0);

                linhas.forEach((tr) => {
                    Array.from(tr.querySelectorAll(".numero-cell")).forEach(
                        (cell, idx) => {
                            if (cell.classList.contains("sorteado")) {
                                freq[idx]++;
                                sequencia[idx]++;
                            } else {
                                sequencia[idx] = 0;
                            }
                        },
                    );
                });

                for (let i = 0; i < totalDezenas; i++) {
                    let count = 0;
                    for (let j = linhas.length - 1; j >= 0; j--) {
                        const cell =
                            linhas[j].querySelectorAll(".numero-cell")[i];
                        if (cell.classList.contains("sorteado")) break;
                        count++;
                    }
                    atraso[i] = count;
                }

                const media = (totalConcursos * 15) / totalDezenas;
                const temperatura = freq.map((f) => {
                    if (f >= media + 2) return "Q";
                    if (f <= media - 2) return "F";
                    return "M";
                });

                criarLinhaEstatistica("Sequência", sequencia);
                criarLinhaEstatistica("Atrasos", atraso);
                criarLinhaEstatistica("Freq.", freq);
                criarLinhaTemperatura(temperatura);

                localStorage.setItem(
                    "estatisticasMapa",
                    JSON.stringify({
                        loteria: loteriaAtual.nome,
                        min: loteriaAtual.min,
                        max: loteriaAtual.max,
                        concursos:
                            document.getElementById("qtd-concursos").value,
                        frequencia: freq,
                        sequencia: sequencia,
                        atraso: atraso,
                        temperatura: temperatura,
                        atualizadoEm: new Date().toISOString(),
                    }),
                );
            }

            function criarLinhaEstatistica(label, valores) {
                const tbody = document.getElementById("tbody-mapa");
                const tr = document.createElement("tr");
                tr.classList.add("linha-estatistica");

                const tdLabel = document.createElement("td");
                tdLabel.textContent = label;
                if (["Atrasos", "Freq.", "Frequência"].includes(label)) {
                    tdLabel.classList.add("estatistica-destaque");
                }
                tr.appendChild(tdLabel);

                valores.forEach((v) => {
                    const td = document.createElement("td");
                    td.textContent = v;
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            }

            function criarLinhaTemperatura(valores) {
                const tbody = document.getElementById("tbody-mapa");
                const tr = document.createElement("tr");
                tr.classList.add("linha-estatistica");

                const tdLabel = document.createElement("td");
                tdLabel.textContent = "Temp.";
                tdLabel.classList.add("estatistica-destaque");
                tr.appendChild(tdLabel);

                valores.forEach((v) => {
                    const td = document.createElement("td");
                    td.textContent = v;
                    td.classList.add(`temp-${v}`);
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            }

            // ===== SELEÇÃO DE COLUNA =====
            let colunasSelecionadas = new Set();

            document
                .getElementById("thead-mapa")
                .addEventListener("click", function (e) {
                    const th = e.target.closest("th");
                    if (!th) return;

                    const ths = Array.from(th.parentElement.children);
                    const colunaIndex = ths.indexOf(th);
                    if (colunaIndex === 0) return;

                    const tabela = document.getElementById("tabela-mapa");
                    const todasLinhas = Array.from(
                        tabela.querySelectorAll("tbody tr"),
                    );
                    const linhas = todasLinhas.slice(0, -4);

                    const ativa = colunasSelecionadas.has(colunaIndex);
                    if (ativa) {
                        colunasSelecionadas.delete(colunaIndex);
                    } else {
                        colunasSelecionadas.add(colunaIndex);
                    }

                    th.classList.toggle("coluna-ativa", !ativa);
                    linhas.forEach((tr) => {
                        const td = tr.children[colunaIndex];
                        if (td) td.classList.toggle("coluna-ativa", !ativa);
                    });
                });
        </script>

        <script src="js/auth-check.js"></script>

        <script>
            window.addEventListener("DOMContentLoaded", () => {
                const temaSalvo = localStorage.getItem("temaMapaDezenas");
                const prefereEscuro = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                aplicarTema(temaSalvo || (prefereEscuro ? "dark" : "light"));

                if (verificarAutenticacao()) {
                    verificarPlanoPro();
                }
            });
        </script>
        <script src="js/cores-bolas.js"></script>
    </body>
</html>
